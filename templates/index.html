{% extends 'base.html' %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h1 class="display-4 text-center">OTA IoT Lessons</h1>
        <p class="lead text-center text-muted">Learn how to update ESP32 devices over the air.</p>
    </div>
</div>

<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {% for lesson in lessons %}
    <div class="col">
        <div class="card h-100 glass-card">
            <div class="card-body">
                <h5 class="card-title text-info">Lesson {{ lesson.id }}</h5>
                <p class="card-text">{{ lesson.title }}</p>
                <a href="{{ url_for('lessons.view_lesson', lesson_id=lesson.id) }}" class="btn btn-outline-light w-100">Read Lesson</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
