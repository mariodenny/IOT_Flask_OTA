{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-5">
        <div class="card glass-card mb-4">
            <div class="card-body">
                <h4 class="card-title mb-4">Upload New Firmware</h4>
                <form action="{{ url_for('firmware.upload') }}" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="version" class="form-label">Version (e.g., 1.0.1)</label>
                        <input type="text" class="form-control" id="version" name="version" required>
                    </div>
                    <div class="mb-3">
                        <label for="device_type" class="form-label">Device Type</label>
                        <input type="text" class="form-control" id="device_type" name="device_type" value="esp32" required>
                    </div>
                    <div class="mb-3">
                        <label for="file" class="form-label">Firmware Binary (.bin)</label>
                        <input class="form-control" type="file" id="file" name="file" accept=".bin" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Upload Firmware</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-7">
        <div class="card glass-card">
            <div class="card-body">
                <h4 class="card-title mb-4">Firmware History</h4>
                <div class="table-responsive">
                    <table class="table table-dark table-hover table-borderless glass-table">
                        <thead>
                            <tr>
                                <th>Version</th>
                                <th>Device</th>
                                <th>File</th>
                                <th>Uploaded At</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for fw in firmwares %}
                            <tr>
                                <td><span class="badge bg-primary">{{ fw.version }}</span></td>
                                <td>{{ fw.device_type }}</td>
                                <td class="text-truncate" style="max-width: 150px;">{{ fw.filename }}</td>
                                <td>{{ fw.uploaded_at }}</td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="4" class="text-center text-muted">No firmware uploaded yet.</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
