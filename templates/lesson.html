{% extends 'base.html' %}

{% block content %}
<div class="row mb-3">
    <div class="col text-end">
        <a href="{{ url_for('lessons.download_pdf', lesson_id=lesson_id) }}" target="_blank" class="btn btn-outline-info">Print / Save as PDF</a>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card glass-card">
            <div class="card-body markdown-body">
                {{ content|safe }}
            </div>
        </div>
    </div>
</div>
{% endblock %}
